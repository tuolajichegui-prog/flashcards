<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Warp Speed Flashcards</title>
    <style>
        html, body {
            overflow-y: auto; margin: 0; padding: 0;
            background-color: #f0f0f0;
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        #app-container {
            max-width: 400px; margin: 0 auto;
            background: #ffffff; min-height: 100vh;
            display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        #setup { padding: 20px; display: flex; flex-direction: column; }
        
        textarea {
            width: 100%; height: 300px; font-size: 16px; font-family: inherit;
            padding: 12px; border: 2px solid #eee; border-radius: 12px;
            box-sizing: border-box; margin-bottom: 15px; resize: none !important; 
            outline: none; background: #fafafa;
        }

        .btn-start {
            width: 100%; padding: 20px; font-size: 22px;
            background: #000; color: #fff; border: none;
            border-radius: 14px; font-weight: bold; cursor: pointer;
        }

        #quiz { display: none; padding: 15px; flex-direction: column; }
        
        #header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #eee; margin-bottom: 15px;
        }

        #card-box {
            padding: 40px 15px; background: #fff; border-radius: 20px;
            border: 2px solid #f0f0f0; min-height: 200px;
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 25px;
        }

        #card { font-size: 85px; line-height: 1.1; word-wrap: break-word; width: 100%; font-family: inherit; color: #111; }

        #controls { display: flex; flex-direction: column; gap: 15px; }

        .answer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .btn-action { padding: 25px; border-radius: 18px; font-size: 36px; border: none; color: white; cursor: pointer; transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.95); }
        .yes { background: #2ecc71; }
        .no { background: #e74c3c; }

        .btn-listen {
            width: 100%; padding: 22px; font-size: 26px; font-weight: 900;
            background: #000; color: #fff; border-radius: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            border: none;
        }

        .btn-exit { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .score-box { font-weight: 800; font-family: system-ui; font-size: 18px; color: #333; }
        .level-pill { font-size: 12px; font-weight: bold; padding: 5px 12px; border-radius: 25px; background: #eee; font-family: system-ui; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h2 style="font-family: system-ui;">Warp Speed Audio</h2>
        <textarea id="inputText" placeholder="Enter cards here..."></textarea>
        <div style="margin-bottom: 20px; font-family: system-ui; text-align: left;">
            <label style="cursor: pointer; font-weight: 600;"><input type="checkbox" id="shuffle"> Shuffle Cards</label>
        </div>
        <button class="btn-start" onclick="go()">START OVERDRIVE</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" class="score-box">0 / 0</div>
            <div id="levelTag" class="level-pill">Level 1</div>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>
        <div id="card-box"><div id="card"></div></div>
        <div id="controls">
            <div class="answer-row">
                <button class="btn-action no" onclick="ans(false)">❌</button>
                <button class="btn-action yes" onclick="ans(true)">✅</button>
            </div>
            <button class="btn-listen" onclick="listenNow()">🔊 WARP LISTEN</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const saved = localStorage.getItem("warp_speed_v1");
        if (saved) document.getElementById("inputText").value = saved;
    };

    function go() {
        speechSynthesis.cancel();
        const text = document.getElementById("inputText").value;
        localStorage.setItem("warp_speed_v1", text);
        list = text.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`COMPLETED\n✅ ${ok} Correct\n❌ ${no} Wrong`);
            stop();
            return;
        }
        const text = list[idx];
        const cardDisplay = document.getElementById("card");
        const levelTag = document.getElementById("levelTag");
        
        cardDisplay.innerText = text;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
        
        if (text.length <= 4) {
            levelTag.innerText = "L1: NATURAL";
            levelTag.style.background = "#d1e7dd";
        } else if (text.length <= 9) {
            levelTag.innerText = "L2: WARP (2.5x)";
            levelTag.style.background = "#fff3cd";
        } else {
            levelTag.innerText = "L3: TURBO (2.2x)";
            levelTag.style.background = "#f8d7da";
        }

        if (text.length > 10) cardDisplay.style.fontSize = "28px";
        else if (text.length > 4) cardDisplay.style.fontSize = "48px";
        else cardDisplay.style.fontSize = "90px";
    }

    function listenNow() {
        speechSynthesis.cancel();
        const text = list[idx];
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-CN';

        // WARP SPEED SETTINGS
        if (text.length <= 4) {
            msg.rate = 1.0; // Natural
        } else if (text.length <= 9) {
            msg.rate = 2.5; // Instant Burst for Med cards
        } else {
            msg.rate = 2.2; // High Speed for Long cards
        }
        
        speechSynthesis.speak(msg);
    }

    function ans(correct) {
        speechSynthesis.cancel(); 
        if (correct) ok++; else no++;
        idx++;
        show();
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
