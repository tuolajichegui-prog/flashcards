<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-Size Flashcards</title>
    <style>
        body { 
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif; 
            text-align: center; 
            margin: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container limits width on PC */
        #app-container {
            width: 100%;
            max-width: 400px; 
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* --- SETUP --- */
        #setup { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; flex: 1; font-size: 16px; font-family: inherit; 
            padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
            resize: none;
        }
        .btn-start { 
            margin: 15px 0; padding: 15px; font-size: 18px; border-radius: 10px; 
            border: none; background-color: #333; color: white; font-weight: bold;
        }

        /* --- QUIZ --- */
        #quiz { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; }
        
        #header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding-bottom: 10px; border-bottom: 1px solid #eee;
        }
        
        /* The Auto-Sizing Card Area */
        #card-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            border: 2px solid #eee;
            border-radius: 15px;
            margin: 20px 0;
            padding: 10px;
            overflow: hidden; /* Keeps text inside */
        }

        #card { 
            font-family: inherit;
            word-wrap: break-word;
            white-space: normal;
            display: block;
            width: 100%;
            /* Initial size - JS will adjust this */
            font-size: 100px; 
            line-height: 1.2;
        }

        /* Buttons at the BOTTOM */
        #controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding-bottom: 10px;
        }

        .btn-action { 
            padding: 18px; border: none; border-radius: 12px; font-size: 28px; color: white;
            cursor: pointer;
        }
        .yes { background-color: #2ecc71; }
        .no { background-color: #e74c3c; }
        .btn-exit { background: #95a5a6; border: none; padding: 6px 10px; border-radius: 5px; color: white; font-size: 12px; }

        .voice-box { display: flex; align-items: center; gap: 5px; font-family: sans-serif; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif;">Card Editor</h3>
        <textarea id="inputText" placeholder="One card per line..."></textarea>
        <div style="margin-top: 10px; font-family: sans-serif;">
            <label><input type="checkbox" id="shuffle"> Shuffle</label>
        </div>
        <button class="btn-start" onclick="go()">START</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-family: sans-serif;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="sound" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="card-frame">
            <div id="card"></div>
        </div>

        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const s = localStorage.getItem("autosize_save");
        if (s) document.getElementById("inputText").value = s;
    };

    function go() {
        const t = document.getElementById("inputText").value;
        localStorage.setItem("autosize_save", t);
        list = t.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    // This function automatically adjusts font size to fit the box
    function autoSizeText() {
        const el = document.getElementById('card');
        const parent = document.getElementById('card-frame');
        let fontSize = 180; // Start big (good for single characters)
        
        el.style.fontSize = fontSize + 'px';
        
        // Shrink until it fits height and width
        while ((el.offsetHeight > parent.offsetHeight - 20 || el.offsetWidth > parent.offsetWidth - 20) && fontSize > 20) {
            fontSize -= 5;
            el.style.fontSize = fontSize + 'px';
        }
    }

    function show() {
        if (idx >= list.length) {
            alert(`✅ ${ok}  ❌ ${no}`);
            stop();
            return;
        }
        const text = list[idx];
        document.getElementById("card").innerText = text;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
        
        // Wait a tiny bit for the text to render then size it
        setTimeout(autoSizeText, 10);
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(list[idx]);
            m.lang = 'zh-CN';
            m.onend = () => { idx++; show(); };
            speechSynthesis.speak(m);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
