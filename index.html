<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forced Scroll Kaiti</title>
    <style>
        body { 
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif; 
            text-align: center; 
            margin: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Keeps the outer screen locked */
        }

        #app-container {
            width: 100%;
            max-width: 450px; 
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- SETUP --- */
        #setup { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; flex: 1; font-size: 18px; font-family: inherit; 
            padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
        }
        .btn-start { 
            margin: 15px 0; padding: 18px; font-size: 20px; border-radius: 12px; 
            border: none; background-color: #222; color: white; font-weight: bold;
        }

        /* --- QUIZ PAGE --- */
        #quiz { display: none; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        
        #header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border-bottom: 1px solid #eee; flex-shrink: 0;
        }
        
        /* SCROLLABLE AREA */
        #card-scroll-box {
            flex: 1;
            margin: 10px 0;
            background: #fafafa;
            border: 2px solid #eee;
            border-radius: 15px;
            
            /* This is the fix: Allow vertical scrolling explicitly */
            overflow-y: scroll; 
            display: block; 
            -webkit-overflow-scrolling: touch; /* Smooth for iPhone */
        }

        #card-content {
            /* Ensures content starts at the top so it can scroll down */
            padding: 40px 20px;
            box-sizing: border-box;
            min-height: 101%; /* Forces a scrollable surface */
        }

        #card { 
            /* Fixed Large Size: On PC it's Kaiti, Phone it's System Default */
            font-size: 80px; 
            line-height: 1.4;
            word-wrap: break-word;
            width: 100%;
            font-family: inherit;
            margin: 0 auto;
        }

        /* Smaller text for long entries so they aren't absolutely massive */
        .long-text { font-size: 45px !important; }

        /* BUTTONS AT BOTTOM */
        #controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 10px;
            flex-shrink: 0;
        }

        .btn-action { 
            padding: 20px; border: none; border-radius: 15px; font-size: 35px; color: white;
        }
        .yes { background-color: #2ecc71; }
        .no { background-color: #e74c3c; }
        .btn-exit { background: #95a5a6; border: none; padding: 6px 12px; border-radius: 5px; color: white; }

        .voice-box { display: flex; align-items: center; gap: 5px; font-weight: bold; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif;">Card Editor</h3>
        <textarea id="inputText" placeholder="Enter cards (one per line)..."></textarea>
        <div style="margin-top: 10px; font-family: sans-serif;">
            <label><input type="checkbox" id="shuffle"> Shuffle Cards</label>
        </div>
        <button class="btn-start" onclick="go()">START QUIZ</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-family: sans-serif;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="sound" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="card-scroll-box">
            <div id="card-content">
                <div id="card"></div>
            </div>
        </div>

        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const s = localStorage.getItem("forced_scroll_save");
        if (s) document.getElementById("inputText").value = s;
    };

    function go() {
        const t = document.getElementById("inputText").value;
        localStorage.setItem("forced_scroll_save", t);
        list = t.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`✅ ${ok}  ❌ ${no}`);
            stop();
            return;
        }
        const text = list[idx];
        const card = document.getElementById("card");
        card.innerText = text;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
        
        // If text is long, use slightly smaller but still big font
        if (text.length > 5) {
            card.className = "long-text";
        } else {
            card.className = "";
        }

        // IMPORTANT: Reset scroll to top immediately
        document.getElementById("card-scroll-box").scrollTop = 0;
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(list[idx]);
            m.lang = 'zh-CN';
            m.onend = () => { idx++; show(); };
            speechSynthesis.speak(m);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
