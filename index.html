<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaiti Flashcards</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body { 
            font-family: "KaiTi", "楷体", "STKaiti", "华文楷体", serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; /* Prevents bouncing on mobile */
        }

        /* Responsive Setup Area */
        #setup { 
            padding: 20px; 
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea { 
            width: 100%; 
            flex: 1;
            font-size: 18px; 
            font-family: inherit; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #ddd;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        /* Big Mobile Buttons */
        button { 
            padding: 18px; 
            font-size: 20px; 
            margin: 5px; 
            cursor: pointer; 
            border-radius: 12px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold;
            touch-action: manipulation; /* Faster clicks on mobile */
        }

        button:active { transform: scale(0.98); opacity: 0.9; }
        button:disabled { opacity: 0.3; }

        /* Quiz Layout */
        #quiz { 
            display: none; 
            height: 100vh; 
            flex-direction: column; 
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        #card { 
            font-size: 25vw; /* Scales with screen width */
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            padding: 10px;
        }

        #score { font-size: 16px; font-family: sans-serif; color: #666; padding-top: 10px; }

        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-bottom: 20px;
        }

        .btn-correct { background: var(--success); }
        .btn-incorrect { background: var(--danger); }
        
        .stop-link {
            color: #999;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 10px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="margin-top:0">Flashcard Setup</h2>
    <textarea id="inputText" placeholder="Line 1&#10;Line 2..."></textarea>
    <div style="margin: 10px 0;">
        <label style="font-family: sans-serif; font-size: 18px;">
            <input type="checkbox" id="shuffleToggle" style="transform: scale(1.5);"> Shuffle
        </label>
    </div>
    <button onclick="startQuiz()">▶ START QUIZ</button>
</div>

<div id="quiz">
    <div id="score"></div>
    <div id="card"></div>
    <div id="controls">
        <button id="incorrectBtn" class="btn-incorrect" onclick="answer(false)">❌</button>
        <button id="correctBtn" class="btn-correct" onclick="answer(true)">✅</button>
    </div>
    <a href="#" class="stop-link" onclick="location.reload()">Reset / Back</a>
</div>

<script>
    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let incorrect = 0;

    const flipSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
    const inputField = document.getElementById("inputText");

    // Load saved text
    window.onload = () => {
        const saved = localStorage.getItem("flashcard_data");
        if (saved) inputField.value = saved;
    };

    inputField.addEventListener("input", () => localStorage.setItem("flashcard_data", inputField.value));

    function speak(text, callback) {
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9; // Slightly slower for clarity
        if (callback) utterance.onend = callback;
        speechSynthesis.speak(utterance);
    }

    function startQuiz() {
        cards = inputField.value.split("\n").filter(line => line.trim() !== "");
        if (cards.length === 0) return;
        if (document.getElementById("shuffleToggle").checked) cards.sort(() => Math.random() - 0.5);

        currentIndex = 0; correct = 0; incorrect = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        showCard();
    }

    function showCard() {
        if (currentIndex >= cards.length) {
            alert(`Finished!\n✅ ${correct} | ❌ ${incorrect}`);
            location.reload();
            return;
        }
        
        flipSound.currentTime = 0;
        flipSound.play();
        document.getElementById("card").innerText = cards[currentIndex];
        document.getElementById("score").innerText = `Card ${currentIndex + 1}/${cards.length} | ✅ ${correct} ❌ ${incorrect}`;
        
        document.getElementById("correctBtn").disabled = false;
        document.getElementById("incorrectBtn").disabled = false;
    }

    function answer(isCorrect) {
        document.getElementById("correctBtn").disabled = true;
        document.getElementById("incorrectBtn").disabled = true;
        if (isCorrect) correct++; else incorrect++;

        speak(cards[currentIndex], () => {
            currentIndex++;
            showCard();
        });
    }

    // --- SERVICE WORKER FOR OFFLINE USE ---
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => e.waitUntil(caches.open('v1').then(c => c.add(location.href))));
            self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
        `;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob));
    }
</script>

</body>
</html>
