<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaiti Cards</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Ma Shan Zheng', "KaiTi", "楷体", serif; 
            text-align: center; 
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- SETUP --- */
        #setup { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; height: 50vh; font-size: 22px; font-family: inherit; 
            padding: 10px; border: 1px solid #ccc; border-radius: 10px;
        }
        button { 
            margin-top: 20px; padding: 15px; font-size: 20px; border-radius: 10px; 
            border: none; background-color: #007AFF; color: white; font-weight: bold;
        }

        /* --- QUIZ --- */
        #quiz { display: none; flex-direction: column; height: 100vh; padding: 20px; }
        #header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        #card { 
            font-size: 40vw; 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: 'Ma Shan Zheng', serif; 
        }

        #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-y { background-color: #28a745; padding: 20px; font-size: 30px; border-radius: 15px; color: white; border: none; }
        .btn-n { background-color: #dc3545; padding: 20px; font-size: 30px; border-radius: 15px; color: white; border: none; }
        .btn-s { background-color: #6c757d; grid-column: span 2; padding: 10px; color: white; border: none; margin-top: 10px; border-radius: 5px; }

        .voice-box { display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .voice-box input { width: 20px; height: 20px; }
    </style>
</head>
<body>

<div id="setup">
    <h2>Flashcard Editor</h2>
    <textarea id="inputText" placeholder="Type words here..."></textarea>
    <div style="margin-top: 15px;"><label><input type="checkbox" id="shuffle"> Shuffle</label></div>
    <button onclick="go()">START QUIZ</button>
</div>

<div id="quiz">
    <div id="header">
        <div id="score" style="font-size: 20px;">0 / 0</div>
        <label class="voice-box">
            <span>🔊 Voice</span>
            <input type="checkbox" id="sound" checked>
        </label>
    </div>

    <div id="card"></div>
    
    <div id="controls">
        <button class="btn-n" onclick="ans(false)">❌</button>
        <button class="btn-y" onclick="ans(true)">✅</button>
        <button class="btn-s" onclick="stop()">STOP</button>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const s = localStorage.getItem("cards");
        if (s) document.getElementById("inputText").value = s;
    };

    function go() {
        const t = document.getElementById("inputText").value;
        localStorage.setItem("cards", t);
        list = t.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`✅ ${ok}  ❌ ${no}`);
            stop();
            return;
        }
        document.getElementById("card").innerText = list[idx];
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(list[idx]);
            m.lang = 'zh-CN';
            m.onend = () => { idx++; show(); };
            speechSynthesis.speak(m);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
