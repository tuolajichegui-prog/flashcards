<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fully Scrollable Flashcards</title>
    <style>
        /* BASE STYLE */
        body { 
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif; 
            margin: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Keeps the main app from bouncing */
        }

        #app-container {
            width: 100%;
            max-width: 450px; 
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- SETUP PAGE (Now Scrollable) --- */
        #setup { 
            padding: 20px; 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; /* Fixed setup scrolling */
        }
        
        textarea { 
            width: 100%; 
            min-height: 60vh; /* Big editor */
            font-size: 18px; 
            font-family: inherit; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box;
            line-height: 1.5;
        }

        .btn-start { 
            margin: 20px 0; 
            padding: 18px; 
            font-size: 20px; 
            border-radius: 12px; 
            border: none; 
            background-color: #000; 
            color: white; 
            font-weight: bold;
            flex-shrink: 0;
        }

        /* --- QUIZ PAGE --- */
        #quiz { 
            display: none; 
            flex-direction: column; 
            height: 100%; 
            padding: 10px; 
            box-sizing: border-box; 
        }
        
        #header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 10px; 
            background: #fff;
            z-index: 10;
            border-bottom: 1px solid #eee;
        }
        
        /* THE FIX: Quiz Card Scroll Zone */
        #card-container {
            flex: 1;
            overflow-y: auto; /* Allows thumb scrolling */
            -webkit-overflow-scrolling: touch; 
            margin: 10px 0;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 15px;
            display: block; /* Important for scroll */
        }

        #card-content {
            padding: 40px 20px;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #card { 
            font-size: 80px; 
            line-height: 1.3;
            word-wrap: break-word;
            width: 100%;
            font-family: inherit;
        }

        /* --- CONTROLS --- */
        #controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 10px;
            background: white;
        }

        .btn-action { padding: 20px; border: none; border-radius: 15px; font-size: 35px; color: white; }
        .yes { background-color: #2ecc71; }
        .no { background-color: #e74c3c; }
        .btn-exit { background: #95a5a6; border: none; padding: 6px 12px; border-radius: 5px; color: white; }

        .voice-box { display: flex; align-items: center; gap: 5px; font-weight: bold; font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif; margin-top: 0;">Card Editor</h3>
        <textarea id="inputText" placeholder="Paste your list here..."></textarea>
        <div style="margin-top: 15px; font-family: sans-serif;">
            <label><input type="checkbox" id="shuffle"> Shuffle Cards</label>
        </div>
        <button class="btn-start" onclick="go()">START QUIZ</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-family: sans-serif;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="sound" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="card-container">
            <div id="card-content">
                <div id="card"></div>
            </div>
        </div>

        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const s = localStorage.getItem("full_scroll_save");
        if (s) document.getElementById("inputText").value = s;
    };

    function go() {
        const t = document.getElementById("inputText").value;
        localStorage.setItem("full_scroll_save", t);
        list = t.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`Results: ✅ ${ok}  ❌ ${no}`);
            stop();
            return;
        }
        const text = list[idx];
        const card = document.getElementById("card");
        card.innerText = text;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
        
        // Adjust font for long text to keep it readable
        card.style.fontSize = text.length > 5 ? "45px" : "80px";

        // Reset quiz scroll to top for every new card
        document.getElementById("card-container").scrollTop = 0;
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(list[idx]);
            m.lang = 'zh-CN';
            m.onend = () => { idx++; show(); };
            speechSynthesis.speak(m);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
