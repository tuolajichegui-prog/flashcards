<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaiti Flashcards</title>
    <style>
        body { 
            /* The original font list that worked for your phone */
            font-family: "KaiTi", "楷体", "STKaiti", "华文楷体", "Kaiti SC", serif; 
            text-align: center; 
            background-color: #f4f4f9; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* --- SETUP SCREEN --- */
        #setup { 
            padding: 20px; 
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea { 
            width: 100%; 
            height: 50vh; 
            font-size: 18px; 
            font-family: inherit; 
            padding: 10px; 
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button { 
            margin-top: 20px; 
            padding: 15px; 
            font-size: 20px; 
            cursor: pointer; 
            border-radius: 10px; 
            border: none; 
            background-color: #4A90E2; 
            color: white; 
            font-weight: bold;
        }

        /* --- QUIZ SCREEN --- */
        #quiz { 
            display: none; 
            flex-direction: column; 
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        #quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: sans-serif;
            margin-bottom: 20px;
        }

        #card { 
            font-size: 30vw; 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
        }

        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .btn-yes { background-color: #2ecc71; padding: 20px; font-size: 30px; border-radius: 15px; border: none; color: white; }
        .btn-no { background-color: #e74c3c; padding: 20px; font-size: 30px; border-radius: 15px; border: none; color: white; }
        
        .btn-stop { 
            background-color: #95a5a6; 
            grid-column: span 2; 
            padding: 10px; 
            font-size: 16px;
            color: white;
            border-radius: 8px;
            border: none;
        }

        .audio-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 18px;
            font-weight: bold;
        }

        .audio-toggle input {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

<div id="setup">
    <h2>Flashcard Editor</h2>
    <textarea id="inputText" placeholder="Enter text here (one per line)..."></textarea>
    <div style="margin-top: 15px; font-family: sans-serif;">
        <label><input type="checkbox" id="shuffleToggle"> Shuffle Cards</label>
    </div>
    <button onclick="startQuiz()">START QUIZ</button>
</div>

<div id="quiz">
    <div id="quiz-header">
        <div id="score" style="font-size: 20px;">0 / 0</div>
        <label class="audio-toggle">
            <span>🔊 Voice</span>
            <input type="checkbox" id="soundToggle" checked>
        </label>
    </div>

    <div id="card"></div>
    
    <div id="controls">
        <button class="btn-no" onclick="answer(false)">❌</button>
        <button class="btn-yes" onclick="answer(true)">✅</button>
        <button class="btn-stop" onclick="stopQuiz()">STOP</button>
    </div>
</div>

<script>
    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let incorrect = 0;

    // Load saved text
    window.onload = () => {
        const saved = localStorage.getItem("my_cards");
        if (saved) document.getElementById("inputText").value = saved;
    };

    function startQuiz() {
        const rawText = document.getElementById("inputText").value;
        localStorage.setItem("my_cards", rawText);
        
        cards = rawText.split("\n").filter(line => line.trim() !== "");
        if (cards.length === 0) return;

        if (document.getElementById("shuffleToggle").checked) {
            cards.sort(() => Math.random() - 0.5);
        }

        currentIndex = 0;
        correct = 0;
        incorrect = 0;
        
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        showCard();
    }

    function showCard() {
        if (currentIndex >= cards.length) {
            alert(`Finished!\nCorrect: ${correct}\nIncorrect: ${incorrect}`);
            stopQuiz();
            return;
        }
        document.getElementById("card").innerText = cards[currentIndex];
        document.getElementById("score").innerText = `${currentIndex + 1} / ${cards.length}`;
    }

    function answer(isCorrect) {
        if (isCorrect) correct++; else incorrect++;

        // Speech logic
        if (document.getElementById("soundToggle").checked) {
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(cards[currentIndex]);
            msg.lang = 'zh-CN';
            msg.onend = () => {
                currentIndex++;
                showCard();
            };
            speechSynthesis.speak(msg);
        } else {
            currentIndex++;
            showCard();
        }
    }

    function stopQuiz() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>

</body>
</html>
