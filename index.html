<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid Kaiti App</title>
    <style>
        body { 
            /* This stack looks for PC Kaiti first. If not found (on a phone), it uses the system default sans-serif. */
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, -apple-system, sans-serif; 
            text-align: center; 
            margin: 0;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #000;
        }

        /* --- SETUP PAGE --- */
        #setup { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; height: 45vh; font-size: 20px; font-family: inherit; 
            padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
        }
        .btn-start { 
            margin-top: 20px; padding: 20px; font-size: 22px; border-radius: 15px; 
            border: none; background-color: #000; color: white; font-weight: bold;
        }

        /* --- QUIZ PAGE (BUTTONS AT TOP) --- */
        #quiz { display: none; height: 100vh; flex-direction: column; padding: 15px; box-sizing: border-box; }
        
        #header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
            background: #f1f1f1;
            padding: 10px;
            border-radius: 10px;
            font-family: sans-serif; /* Keep UI clean */
        }
        
        #card { 
            font-size: 45vw; 
            flex: 1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-family: inherit; /* PC: Kaiti | Phone: Default */
        }

        #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .btn-y { background-color: #2ecc71; padding: 20px; font-size: 35px; border-radius: 15px; color: white; border: none; }
        .btn-n { background-color: #e74c3c; padding: 20px; font-size: 35px; border-radius: 15px; color: white; border: none; }
        .btn-s { background-color: #95a5a6; grid-column: span 2; padding: 10px; color: white; border: none; border-radius: 8px; font-family: sans-serif; }

        .voice-box { display: flex; align-items: center; gap: 8px; font-weight: bold; font-family: sans-serif; }
        .voice-box input { width: 24px; height: 24px; }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="font-family: sans-serif;">Flashcard Editor</h2>
    <textarea id="inputText" placeholder="Paste your words here..."></textarea>
    <div style="margin-top: 15px; font-family: sans-serif;">
        <label><input type="checkbox" id="shuffle"> Shuffle Cards</label>
    </div>
    <button class="btn-start" onclick="go()">START QUIZ</button>
</div>

<div id="quiz">
    <div id="header">
        <div id="score" style="font-size: 20px; font-weight: bold;">0 / 0</div>
        <label class="voice-box">
            <span>🔊 Voice</span>
            <input type="checkbox" id="sound" checked>
        </label>
        <button class="btn-s" style="margin:0; width:auto; padding: 5px 10px;" onclick="stop()">EXIT</button>
    </div>

    <div id="controls">
        <button class="btn-n" onclick="ans(false)">❌</button>
        <button class="btn-y" onclick="ans(true)">✅</button>
    </div>

    <div id="card"></div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const s = localStorage.getItem("hybrid_kaiti_save");
        if (s) document.getElementById("inputText").value = s;
    };

    function go() {
        const t = document.getElementById("inputText").value;
        localStorage.setItem("hybrid_kaiti_save", t);
        list = t.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`Session Done!\n✅ ${ok} Correct\n❌ ${no} Incorrect`);
            stop();
            return;
        }
        document.getElementById("card").innerText = list[idx];
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(list[idx]);
            m.lang = 'zh-CN';
            m.onend = () => { idx++; show(); };
            speechSynthesis.speak(m);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
