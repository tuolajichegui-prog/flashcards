<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scrollable Kaiti Cards</title>
    <style>
        body { 
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif; 
            text-align: center; 
            margin: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Lock the screen */
        }

        #app-container {
            width: 100%;
            max-width: 420px; 
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* --- SETUP --- */
        #setup { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; flex: 1; font-size: 18px; font-family: inherit; 
            padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
            resize: none;
        }
        .btn-start { 
            margin: 15px 0; padding: 18px; font-size: 20px; border-radius: 12px; 
            border: none; background-color: #222; color: white; font-weight: bold;
        }

        /* --- QUIZ PAGE --- */
        #quiz { display: none; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }
        
        #header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px; border-bottom: 1px solid #eee; font-family: sans-serif;
        }
        
        /* THE CARD FRAME: This is the scrolling magic */
        #card-frame {
            flex: 1;
            margin: 15px 5px;
            background: #fafafa;
            border: 2px solid #efefef;
            border-radius: 15px;
            overflow-y: auto; /* Allow vertical scroll */
            display: block; /* Required for proper scrolling */
            -webkit-overflow-scrolling: touch;
        }

        #card-content {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #card { 
            font-size: 120px; /* Big default for PC/Phone */
            line-height: 1.3;
            word-wrap: break-word;
            width: 100%;
            font-family: inherit;
        }

        /* Adjustments for PC */
        @media (min-width: 500px) {
            #card { font-size: 100px; }
        }

        /* BUTTONS AT BOTTOM */
        #controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            padding: 10px;
        }

        .btn-action { 
            padding: 20px; border: none; border-radius: 15px; font-size: 35px; color: white;
            cursor: pointer;
        }
        .yes { background-color: #2ecc71; }
        .no { background-color: #e74c3c; }
        .btn-exit { background: #95a5a6; border: none; padding: 6px 12px; border-radius: 5px; color: white; }

        .voice-box { display: flex; align-items: center; gap: 5px; font-weight: bold; font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif;">Card Editor</h3>
        <textarea id="inputText" placeholder="Paste text here..."></textarea>
        <div style="margin-top: 10px; font-family: sans-serif;">
            <label><input type="checkbox" id="shuffle"> Shuffle Cards</label>
        </div>
        <button class="btn-start" onclick="go()">START</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-family: sans-serif;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="sound" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="card-frame">
            <div id="card-content">
                <div id="card"></div>
            </div>
        </div>

        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const s = localStorage.getItem("scroll_kaiti_save");
        if (s) document.getElementById("inputText").value = s;
    };

    function go() {
        const t = document.getElementById("inputText").value;
        localStorage.setItem("scroll_kaiti_save", t);
        list = t.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`Done!\n✅ ${ok}  ❌ ${no}`);
            stop();
            return;
        }
        const text = list[idx];
        const card = document.getElementById("card");
        card.innerText = text;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
        
        // Auto-shrink font slightly for long sentences so they aren't TOO huge
        if (text.length > 4) {
            card.style.fontSize = "60px";
        } else if (text.length > 1) {
            card.style.fontSize = "90px";
        } else {
            card.style.fontSize = "120px";
        }

        // Reset scroll to top
        document.getElementById("card-frame").scrollTop = 0;
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(list[idx]);
            m.lang = 'zh-CN';
            m.onend = () => { idx++; show(); };
            speechSynthesis.speak(m);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
