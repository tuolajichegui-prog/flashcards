<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Natural Speed Flashcards</title>
    <style>
        html, body {
            overflow-y: auto;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        #app-container {
            max-width: 400px; 
            margin: 0 auto;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        #setup { padding: 20px; display: flex; flex-direction: column; }
        
        textarea {
            width: 100%;
            height: 300px;
            font-size: 16px;
            font-family: inherit;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 15px;
            resize: none !important; 
            overflow-y: auto;
            outline: none;
        }

        .btn-start {
            width: 100%;
            padding: 18px;
            font-size: 20px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        #quiz { display: none; padding: 15px; flex-direction: column; }
        
        #header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #eee; margin-bottom: 10px;
        }

        #card-box {
            padding: 40px 15px;
            background: #fafafa;
            border-radius: 15px;
            border: 1px solid #eee;
            min-height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #card { font-size: 80px; line-height: 1.3; word-wrap: break-word; width: 100%; font-family: inherit; }

        #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-action {
            padding: 22px; border-radius: 15px; font-size: 32px; border: none; color: white;
            cursor: pointer;
        }

        .yes { background: #27ae60; }
        .no { background: #e74c3c; }

        .btn-exit { background: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .voice-box { display: flex; align-items: center; gap: 5px; font-weight: bold; font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif;">Card Editor</h3>
        <textarea id="inputText" placeholder="Paste your words or sentences here..."></textarea>
        <div style="margin-bottom: 15px; font-family: sans-serif; text-align: left;">
            <label style="cursor: pointer;"><input type="checkbox" id="shuffle"> Shuffle Cards</label>
        </div>
        <button class="btn-start" onclick="go()">START</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-family: sans-serif;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Real Speed</span>
                <input type="checkbox" id="sound" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>
        <div id="card-box"><div id="card"></div></div>
        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const saved = localStorage.getItem("fast_guy_save");
        if (saved) document.getElementById("inputText").value = saved;
    };

    function go() {
        const text = document.getElementById("inputText").value;
        localStorage.setItem("fast_guy_save", text);
        list = text.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`Done!\n✅ ${ok} Correct | ❌ ${no} Wrong`);
            stop();
            return;
        }
        const currentText = list[idx];
        const cardDisplay = document.getElementById("card");
        cardDisplay.innerText = currentText;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
        
        if (currentText.length > 15) cardDisplay.style.fontSize = "22px";
        else if (currentText.length > 8) cardDisplay.style.fontSize = "32px";
        else if (currentText.length > 4) cardDisplay.style.fontSize = "50px";
        else cardDisplay.style.fontSize = "80px";

        window.scrollTo(0, 0);
    }

    function speak(text) {
        if (!document.getElementById("sound").checked) {
            idx++; show();
            return;
        }
        
        speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'zh-CN';
        
        // --- NATURAL SPEED (1.1 - 1.2 is typical human speed) ---
        msg.rate = 1.1; 
        
        msg.onend = () => {
            idx++; 
            show();
        };
        
        speechSynthesis.speak(msg);
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        speak(list[idx]);
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
        window.scrollTo(0, 0);
    }
</script>
</body>
</html>
