<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Scroll Flashcards</title>
    <style>
        /* Natural scroll for phone, centered for PC */
        html, body {
            overflow-y: auto;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif;
            text-align: center;
        }

        #app-container {
            max-width: 400px; /* Slimmer PC width */
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        /* --- SETUP --- */
        #setup {
            padding: 20px;
            display: block;
        }

        textarea {
            width: 100%;
            height: 250px; /* Fixed smaller height */
            font-size: 16px;
            font-family: inherit;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-bottom: 15px;
            resize: none; /* DISABLED RESIZING */
            display: block;
        }

        .btn-start {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- QUIZ --- */
        #quiz {
            display: none; 
            padding: 15px;
            flex-direction: column;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            position: sticky;
            top: 0;
            background: #fff;
            border-bottom: 1px solid #eee;
            z-index: 10;
        }

        /* Compact Card Area */
        #card-box {
            padding: 40px 15px;
            margin: 15px 0;
            background: #fafafa;
            border-radius: 15px;
            border: 1px solid #eee;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #card {
            font-size: 70px;
            line-height: 1.3;
            word-wrap: break-word;
            width: 100%;
            font-family: inherit;
        }

        /* BUTTONS AT BOTTOM */
        #controls {
            padding: 10px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-action {
            padding: 18px;
            border-radius: 12px;
            font-size: 30px;
            border: none;
            color: white;
            cursor: pointer;
        }

        .yes { background: #2ecc71; }
        .no { background: #e74c3c; }

        .btn-exit { background: #95a5a6; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .voice-box { display: flex; align-items: center; gap: 5px; font-weight: bold; font-family: sans-serif; font-size: 14px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif; margin-top: 5px;">Editor</h3>
        <textarea id="inputText" placeholder="Paste your words..."></textarea>
        <div style="margin-bottom: 15px; font-family: sans-serif;">
            <label><input type="checkbox" id="shuffle"> Shuffle</label>
        </div>
        <button class="btn-start" onclick="go()">START</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-family: sans-serif;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="sound" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="card-box">
            <div id="card"></div>
        </div>

        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const saved = localStorage.getItem("compact_natural_save");
        if (saved) document.getElementById("inputText").value = saved;
    };

    function go() {
        const text = document.getElementById("inputText").value;
        localStorage.setItem("compact_natural_save", text);
        
        list = text.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;

        if (document.getElementById("shuffle").checked) {
            list.sort(() => Math.random() - 0.5);
        }

        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`✅ ${ok} Correct\n❌ ${no} Incorrect`);
            stop();
            return;
        }
        
        const currentText = list[idx];
        const cardDisplay = document.getElementById("card");
        
        cardDisplay.innerText = currentText;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;

        // Auto-scale font based on length
        if (currentText.length > 8) cardDisplay.style.fontSize = "32px";
        else if (currentText.length > 4) cardDisplay.style.fontSize = "50px";
        else cardDisplay.style.fontSize = "80px";

        window.scrollTo(0, 0);
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(list[idx]);
            msg.lang = 'zh-CN';
            msg.onend = () => { idx++; show(); };
            speechSynthesis.speak(msg);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "block";
        document.getElementById("quiz").style.display = "none";
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
