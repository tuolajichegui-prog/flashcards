<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaiti Cards</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Noto Serif SC', "KaiTi", "楷体", serif; 
            text-align: center; 
            margin: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #000;
        }

        /* --- SETUP PAGE --- */
        #setup { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; height: 50vh; font-size: 20px; font-family: inherit; 
            padding: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box;
        }
        .btn-start { 
            margin-top: 20px; padding: 20px; font-size: 24px; border-radius: 15px; 
            border: none; background: #000; color: white; font-weight: bold;
        }

        /* --- QUIZ PAGE (EVERYTHING AT THE TOP) --- */
        #quiz { display: none; height: 100vh; flex-direction: column; padding: 10px; }

        #ui-top {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            padding-bottom: 20px;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f7f7f7;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: sans-serif;
        }

        #actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn { 
            padding: 15px; border: none; border-radius: 15px; font-size: 35px; color: white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); touch-action: manipulation;
        }
        .yes { background: #2ecc71; }
        .no { background: #e74c3c; }

        .voice-label { display: flex; align-items: center; gap: 5px; font-weight: bold; font-family: sans-serif; }
        .voice-label input { width: 22px; height: 22px; }

        /* THE CHARACTER (Center Bottom) */
        #card { 
            font-size: 45vw; 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .btn-exit { background: none; border: 1px solid #ddd; padding: 5px 12px; border-radius: 20px; font-size: 14px; color: #999; }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="font-family: sans-serif;">Flashcard Editor</h2>
    <textarea id="inputText" placeholder="Enter text here..."></textarea>
    <div style="margin: 15px 0; font-family: sans-serif;">
        <label><input type="checkbox" id="shuffleToggle"> Shuffle Cards</label>
    </div>
    <button class="btn-start" onclick="start()">START QUIZ</button>
</div>

<div id="quiz">
    <div id="ui-top">
        <div id="header">
            <span id="score" style="font-weight: bold;">0/0</span>
            <label class="voice-label">
                <span>🔊 Voice</span>
                <input type="checkbox" id="soundToggle" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="actions">
            <button id="noBtn" class="btn no" onclick="press(false)">❌</button>
            <button id="yesBtn" class="btn yes" onclick="press(true)">✅</button>
        </div>
    </div>

    <div id="card"></div>
</div>

<script>
    let list = [];
    let cur = 0;
    let ok = 0, no = 0;
    const sound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

    window.onload = () => {
        document.getElementById("inputText").value = localStorage.getItem("save") || "";
    };

    function start() {
        const t = document.getElementById("inputText").value;
        list = t.split("\n").filter(x => x.trim() !== "");
        if (list.length === 0) return;
        localStorage.setItem("save", t);
        if (document.getElementById("shuffleToggle").checked) list.sort(() => Math.random() - 0.5);
        cur = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (cur >= list.length) {
            alert(`✅ ${ok}  ❌ ${no}`);
            stop();
            return;
        }
        sound.currentTime = 0; sound.play();
        document.getElementById("card").innerText = list[cur];
        document.getElementById("score").innerText = `${cur + 1} / ${list.length}`;
        document.getElementById("yesBtn").disabled = false;
        document.getElementById("noBtn").disabled = false;
    }

    function press(isOk) {
        document.getElementById("yesBtn").disabled = true;
        document.getElementById("noBtn").disabled = true;
        if (isOk) ok++; else no++;
        
        if (document.getElementById("soundToggle").checked) {
            speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(list[cur]);
            u.lang = 'zh-CN';
            u.onend = () => { cur++; show(); };
            speechSynthesis.speak(u);
        } else {
            cur++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
