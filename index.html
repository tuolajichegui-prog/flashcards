<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kaiti Flashcards Pro</title>
    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        body { 
            /* Microsoft Word Kaiti Font Stack */
            font-family: "KaiTi", "楷体", "STKaiti", "华文楷体", "NSimSun", serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Moves controls higher up */
        #setup { 
            padding: 10px 20px; 
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Aligns content to top */
        }

        h2 { margin: 5px 0; font-size: 1.5rem; }

        textarea { 
            width: 100%; 
            height: 40vh; /* Takes up less space to keep buttons high */
            font-size: 18px; 
            font-family: inherit; 
            padding: 12px; 
            border-radius: 10px; 
            border: 2px solid #ddd;
            box-sizing: border-box;
        }

        .settings-row {
            margin: 10px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-family: sans-serif;
            font-weight: bold;
        }

        button { 
            padding: 15px; 
            font-size: 18px; 
            border-radius: 12px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold;
            touch-action: manipulation;
        }

        /* Quiz Styles */
        #quiz { 
            display: none; 
            height: 100vh; 
            flex-direction: column; 
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        #card { 
            font-size: 20vw; 
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-bottom: 10px;
        }

        .btn-correct { background: var(--success); }
        .btn-incorrect { background: var(--danger); }
        .btn-stop { background: #95a5a6; grid-column: span 2; padding: 10px; }
    </style>
</head>
<body>

<div id="setup">
    <h2>Flashcard Editor</h2>
    <textarea id="inputText" placeholder="Enter text..."></textarea>
    
    <div class="settings-row">
        <label><input type="checkbox" id="shuffleToggle"> Shuffle</label>
        <label><input type="checkbox" id="soundToggle" checked> Read Aloud</label>
    </div>
    
    <button onclick="startQuiz()">▶ START QUIZ</button>
</div>

<div id="quiz">
    <div id="score" style="font-family: sans-serif; color: #666;"></div>
    <div id="card"></div>
    
    <div id="controls">
        <button id="incorrectBtn" class="btn-incorrect" onclick="answer(false)">❌</button>
        <button id="correctBtn" class="btn-correct" onclick="answer(true)">✅</button>
        <button class="btn-stop" onclick="stopQuiz()">⏹ STOP / PAUSE</button>
    </div>
</div>

<script>
    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let incorrect = 0;

    const flipSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

    window.onload = () => {
        const saved = localStorage.getItem("cards_save");
        if (saved) document.getElementById("inputText").value = saved;
    };

    document.getElementById("inputText").addEventListener("input", (e) => {
        localStorage.setItem("cards_save", e.target.value);
    });

    function speak(text, callback) {
        if (!document.getElementById("soundToggle").checked) {
            if (callback) callback();
            return;
        }
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        if (callback) utterance.onend = callback;
        speechSynthesis.speak(utterance);
    }

    function startQuiz() {
        const raw = document.getElementById("inputText").value;
        cards = raw.split("\n").filter(line => line.trim() !== "");
        if (cards.length === 0) return;
        
        if (document.getElementById("shuffleToggle").checked) {
            cards.sort(() => Math.random() - 0.5);
        }

        currentIndex = 0; correct = 0; incorrect = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        showCard();
    }

    function showCard() {
        if (currentIndex >= cards.length) {
            alert(`Final Score: ✅${correct} ❌${incorrect}`);
            stopQuiz();
            return;
        }

        flipSound.currentTime = 0;
        flipSound.play();

        document.getElementById("card").innerText = cards[currentIndex];
        document.getElementById("score").innerText = `Card ${currentIndex + 1} / ${cards.length} | ✅ ${correct} ❌ ${incorrect}`;
        
        document.getElementById("correctBtn").disabled = false;
        document.getElementById("incorrectBtn").disabled = false;
    }

    function answer(isCorrect) {
        document.getElementById("correctBtn").disabled = true;
        document.getElementById("incorrectBtn").disabled = true;
        
        if (isCorrect) correct++; else incorrect++;

        // Steps: 1. Speak current word (if enabled) -> 2. Next card
        speak(cards[currentIndex], () => {
            currentIndex++;
            showCard();
        });
    }

    function stopQuiz() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
