<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Component-Based Kaiti System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2d3436;
            --success: #00b894;
            --danger: #d63031;
            --header-bg: #fdfdfd;
        }

        body { 
            font-family: 'ZCOOL XiaoWei', "KaiTi", serif; 
            text-align: center; 
            background: #ffffff; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- EDITOR SCREEN --- */
        #setup { padding: 25px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; flex: 0.5; font-size: 22px; font-family: inherit; 
            padding: 15px; border: 2px solid #eee; border-radius: 12px; outline: none;
            background: #fafafa;
        }
        .btn-start { 
            margin-top: 25px; padding: 20px; background: var(--primary); 
            color: white; border: none; border-radius: 15px; font-size: 22px; font-weight: bold;
        }

        /* --- TOP-MOUNTED UI (Quiz Mode) --- */
        #quiz { display: none; height: 100vh; flex-direction: column; box-sizing: border-box; }

        #ui-stack {
            width: 100%;
            background: var(--header-bg);
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        #meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: sans-serif;
            color: #636e72;
            font-size: 15px;
        }

        #interaction-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Large Action Buttons */
        .btn-action { 
            padding: 15px; border: none; border-radius: 12px; font-size: 32px; color: white;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1); touch-action: manipulation;
        }
        .pass { background: var(--success); }
        .fail { background: var(--danger); }

        .audio-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f1f2f6;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .audio-pill input { width: 22px; height: 22px; }

        /* THE CHARACTER DISPLAY (Optimized for component viewing) */
        #stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
        }

        #char-display { 
            font-size: 45vw; 
            font-family: inherit;
            color: #2d3436;
            line-height: 1;
        }

        .btn-exit { background: none; border: 1px solid #dfe6e9; padding: 4px 10px; border-radius: 6px; color: #b2bec3; }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="font-family: sans-serif; color: #2d3436;">Component Library v.488B</h2>
    <textarea id="inputText" placeholder="Input character string..."></textarea>
    <div style="margin: 20px 0; font-family: sans-serif; font-size: 18px;">
        <label><input type="checkbox" id="shuffleToggle" style="width: 20px; height: 20px;"> Shuffle Database</label>
    </div>
    <button class="btn-start" onclick="initSystem()">GENERATE LIBRARY</button>
</div>

<div id="quiz">
    <div id="ui-stack">
        <div id="meta-info">
            <span id="counter">IDX: 0 / 0</span>
            <label class="audio-pill">
                <span>🔊 VOICE</span>
                <input type="checkbox" id="soundToggle" checked>
            </label>
            <button class="btn-exit" onclick="resetSystem()">RESET</button>
        </div>

        <div id="interaction-row">
            <button id="failBtn" class="btn-action fail" onclick="process(false)">❌</button>
            <button id="passBtn" class="btn-action pass" onclick="process(true)">✅</button>
        </div>
    </div>

    <div id="stage">
        <div id="char-display"></div>
    </div>
</div>

<script>
    let db = [];
    let currentPos = 0;
    let results = { ok: 0, no: 0 };
    const clickSfx = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

    window.onload = () => {
        document.getElementById("inputText").value = localStorage.getItem("lib_data") || "";
    };

    function initSystem() {
        const text = document.getElementById("inputText").value;
        db = text.split("\n").filter(t => t.trim() !== "");
        if (db.length === 0) return;
        localStorage.setItem("lib_data", text);
        
        if (document.getElementById("shuffleToggle").checked) db.sort(() => Math.random() - 0.5);

        currentPos = 0; results = { ok: 0, no: 0 };
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        draw();
    }

    function draw() {
        if (currentPos >= db.length) {
            alert(`Database Scan Complete\nSuccess Rate: ${Math.round((results.ok / db.length) * 100)}%`);
            resetSystem();
            return;
        }
        clickSfx.currentTime = 0; clickSfx.play();
        document.getElementById("char-display").innerText = db[currentPos];
        document.getElementById("counter").innerText = `COMPONENT: ${currentPos + 1} / ${db.length}`;
        document.getElementById("passBtn").disabled = false;
        document.getElementById("failBtn").disabled = false;
    }

    function process(isOk) {
        document.getElementById("passBtn").disabled = true;
        document.getElementById("failBtn").disabled = true;
        if (isOk) results.ok++; else results.no++;

        if (document.getElementById("soundToggle").checked) {
            speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(db[currentPos]);
            utterance.lang = 'zh-CN';
            utterance.rate = 0.9;
            utterance.onend = () => { currentPos++; draw(); };
            speechSynthesis.speak(utterance);
        } else {
            currentPos++;
            draw();
        }
    }

    function resetSystem() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
