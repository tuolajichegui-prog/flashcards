<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Natural Scroll Flashcards</title>
    <style>
        /* Forces the phone to allow scrolling on the whole page */
        html, body {
            overflow-y: auto !important;
            height: auto !important;
            min-height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif;
            text-align: center;
        }

        #app-container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }

        /* --- SETUP --- */
        #setup {
            padding: 20px;
            display: block; /* Normal flow */
        }

        textarea {
            width: 100%;
            min-height: 300px; /* Big area to start */
            font-size: 18px;
            font-family: inherit;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .btn-start {
            width: 100%;
            padding: 20px;
            font-size: 22px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: bold;
        }

        /* --- QUIZ --- */
        #quiz {
            display: none; /* Toggled by JS */
            padding: 15px;
            flex-direction: column;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            position: sticky; /* Keeps score visible at top */
            top: 0;
            background: #fff;
            border-bottom: 1px solid #eee;
            z-index: 10;
        }

        /* The Card Area: Just grows with the text */
        #card-box {
            padding: 60px 20px;
            margin: 20px 0;
            background: #fafafa;
            border-radius: 20px;
            border: 1px solid #f0f0f0;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #card {
            font-size: 80px;
            line-height: 1.4;
            word-wrap: break-word;
            width: 100%;
            font-family: inherit;
        }

        /* CONTROLS AT BOTTOM */
        #controls {
            padding: 20px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-action {
            padding: 25px;
            border-radius: 15px;
            font-size: 35px;
            border: none;
            color: white;
        }

        .yes { background: #2ecc71; }
        .no { background: #e74c3c; }

        .btn-exit { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 6px; }
        .voice-box { display: flex; align-items: center; gap: 8px; font-weight: bold; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h2 style="font-family: sans-serif;">Card Editor</h2>
        <textarea id="inputText" placeholder="Enter cards here..."></textarea>
        <div style="margin-bottom: 20px; font-family: sans-serif;">
            <label style="font-size: 18px;"><input type="checkbox" id="shuffle" style="width:20px; height:20px;"> Shuffle</label>
        </div>
        <button class="btn-start" onclick="go()">START QUIZ</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-size: 20px;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="sound" checked style="width:20px; height:20px;">
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="card-box">
            <div id="card"></div>
        </div>

        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    // Load saved data
    window.onload = () => {
        const saved = localStorage.getItem("natural_scroll_save");
        if (saved) document.getElementById("inputText").value = saved;
    };

    function go() {
        const text = document.getElementById("inputText").value;
        localStorage.setItem("natural_scroll_save", text);
        
        list = text.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;

        if (document.getElementById("shuffle").checked) {
            list.sort(() => Math.random() - 0.5);
        }

        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`Finished!\n✅ ${ok} Correct\n❌ ${no} Incorrect`);
            stop();
            return;
        }
        
        const currentText = list[idx];
        const cardDisplay = document.getElementById("card");
        
        cardDisplay.innerText = currentText;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;

        // Keep text big for short words, shrink slightly for long ones
        cardDisplay.style.fontSize = currentText.length > 6 ? "40px" : "80px";

        // Scroll page back to top for new card
        window.scrollTo(0, 0);
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(list[idx]);
            msg.lang = 'zh-CN';
            msg.onend = () => { idx++; show(); };
            speechSynthesis.speak(msg);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "block";
        document.getElementById("quiz").style.display = "none";
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
