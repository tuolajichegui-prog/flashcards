<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compact Hybrid Cards</title>
    <style>
        body { 
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif; 
            text-align: center; 
            margin: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        #app-container {
            width: 100%;
            max-width: 450px; /* Keeps the whole app slim on PC */
            background: #ffffff;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* --- SETUP --- */
        #setup { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; flex: 1; font-size: 16px; font-family: inherit; 
            padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
            resize: none;
        }
        .btn-start { 
            margin: 15px 0; padding: 15px; font-size: 18px; border-radius: 10px; 
            border: none; background-color: #222; color: white; font-weight: bold;
        }

        /* --- QUIZ PAGE --- */
        #quiz { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; }
        
        #header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 5px; font-family: sans-serif;
        }
        
        /* Smaller Character Box */
        #card-frame {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 20px;
            margin: 10px 0;
        }

        #card { 
            font-size: 25vw; /* Smaller for phone */
            font-family: inherit;
        }

        /* Strict limit for PC screen size */
        @media (min-width: 500px) {
            #card { font-size: 120px; } /* Much smaller on PC */
        }

        /* Buttons at the BOTTOM */
        #controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            padding: 10px 0;
        }

        .btn-action { 
            padding: 18px; border: none; border-radius: 12px; font-size: 28px; color: white;
            touch-action: manipulation;
        }
        .yes { background-color: #27ae60; }
        .no { background-color: #e74c3c; }

        .btn-exit { background: #95a5a6; border: none; padding: 6px 12px; border-radius: 4px; color: white; font-size: 11px; }

        .voice-box { display: flex; align-items: center; gap: 6px; font-weight: bold; font-family: sans-serif; font-size: 13px; }
        .voice-box input { width: 18px; height: 18px; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif; margin: 10px 0;">Card Editor</h3>
        <textarea id="inputText" placeholder="Type or paste words..."></textarea>
        <div style="margin-top: 12px; font-family: sans-serif;">
            <label><input type="checkbox" id="shuffle"> Shuffle</label>
        </div>
        <button class="btn-start" onclick="go()">START</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" style="font-weight: bold; font-family: sans-serif;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="sound" checked>
            </label>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>

        <div id="card-frame">
            <div id="card"></div>
        </div>

        <div id="controls">
            <button class="btn-action no" onclick="ans(false)">❌</button>
            <button class="btn-action yes" onclick="ans(true)">✅</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;

    window.onload = () => {
        const s = localStorage.getItem("compact_save");
        if (s) document.getElementById("inputText").value = s;
    };

    function go() {
        const t = document.getElementById("inputText").value;
        localStorage.setItem("compact_save", t);
        list = t.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`Result: ✅ ${ok} ❌ ${no}`);
            stop();
            return;
        }
        document.getElementById("card").innerText = list[idx];
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
    }

    function ans(correct) {
        if (correct) ok++; else no++;
        if (document.getElementById("sound").checked) {
            speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(list[idx]);
            m.lang = 'zh-CN';
            m.onend = () => { idx++; show(); };
            speechSynthesis.speak(m);
        } else {
            idx++; show();
        }
    }

    function stop() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
