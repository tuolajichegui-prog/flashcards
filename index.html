<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Precision 3-Level Flashcards</title>
    <style>
        html, body {
            overflow-y: auto; margin: 0; padding: 0;
            background-color: #f7f7f7;
            font-family: "KaiTi", "楷体", "STKaiti", system-ui, sans-serif;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }

        #app-container {
            max-width: 400px; margin: 0 auto;
            background: #ffffff; min-height: 100vh;
            display: flex; flex-direction: column;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
        }

        #setup { padding: 20px; display: flex; flex-direction: column; }
        
        textarea {
            width: 100%; height: 300px; font-size: 16px; font-family: inherit;
            padding: 12px; border: 1px solid #ddd; border-radius: 10px;
            box-sizing: border-box; margin-bottom: 15px; resize: none !important; 
            outline: none;
        }

        .btn-start {
            width: 100%; padding: 18px; font-size: 20px;
            background: #111; color: #fff; border: none;
            border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        #quiz { display: none; padding: 15px; flex-direction: column; }
        
        #header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #eee; margin-bottom: 10px;
        }

        #card-box {
            padding: 30px 15px; background: #fafafa; border-radius: 15px;
            border: 1px solid #eee; min-height: 180px;
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 20px;
        }

        #card { font-size: 80px; line-height: 1.2; word-wrap: break-word; width: 100%; font-family: inherit; }

        #controls { display: flex; flex-direction: column; gap: 15px; }

        .answer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-action { padding: 22px; border-radius: 15px; font-size: 32px; border: none; color: white; cursor: pointer; }
        .yes { background: #27ae60; }
        .no { background: #e74c3c; }

        .btn-listen {
            width: 100%; padding: 20px; font-size: 24px; font-weight: bold;
            background: #f0f0f0; border: 1px solid #ccc; border-radius: 15px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-exit { background: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
        .score-box { font-weight: bold; font-family: sans-serif; font-size: 16px; }
        .level-pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; background: #eee; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="setup">
        <h3 style="font-family: sans-serif;">Precision 3-Level Audio</h3>
        <textarea id="inputText" placeholder="Enter cards here..."></textarea>
        <div style="margin-bottom: 15px; font-family: sans-serif; text-align: left;">
            <label style="cursor: pointer;"><input type="checkbox" id="shuffle"> Shuffle Cards</label>
        </div>
        <button class="btn-start" onclick="go()">START</button>
    </div>

    <div id="quiz">
        <div id="header">
            <div id="score" class="score-box">0 / 0</div>
            <div id="levelTag" class="level-pill">Level 1</div>
            <button class="btn-exit" onclick="stop()">EXIT</button>
        </div>
        <div id="card-box"><div id="card"></div></div>
        <div id="controls">
            <div class="answer-row">
                <button class="btn-action no" onclick="ans(false)">❌</button>
                <button class="btn-action yes" onclick="ans(true)">✅</button>
            </div>
            <button class="btn-listen" onclick="listenNow()">🔊 LISTEN</button>
        </div>
    </div>
</div>

<script>
    let list = [];
    let idx = 0;
    let ok = 0, no = 0;
    let isSpeaking = false;

    window.onload = () => {
        const saved = localStorage.getItem("precision_3_save");
        if (saved) document.getElementById("inputText").value = saved;
    };

    function go() {
        resetSpeech();
        const text = document.getElementById("inputText").value;
        localStorage.setItem("precision_3_save", text);
        list = text.split("\n").filter(l => l.trim() !== "");
        if (list.length === 0) return;
        if (document.getElementById("shuffle").checked) list.sort(() => Math.random() - 0.5);
        idx = 0; ok = 0; no = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        show();
    }

    function show() {
        if (idx >= list.length) {
            alert(`Finished!\n✅ ${ok} Correct | ❌ ${no} Wrong`);
            stop();
            return;
        }
        const text = list[idx];
        const cardDisplay = document.getElementById("card");
        const levelTag = document.getElementById("levelTag");
        
        cardDisplay.innerText = text;
        document.getElementById("score").innerText = `${idx + 1} / ${list.length}`;
        
        if (text.length <= 4) {
            levelTag.innerText = "Lvl 1: Natural";
            levelTag.style.background = "#d1e7dd";
        } else if (text.length <= 9) {
            levelTag.innerText = "Lvl 2: 0.006s";
            levelTag.style.background = "#fff3cd";
        } else {
            levelTag.innerText = "Lvl 3: 0.010s";
            levelTag.style.background = "#f8d7da";
        }

        if (text.length > 10) cardDisplay.style.fontSize = "26px";
        else if (text.length > 4) cardDisplay.style.fontSize = "45px";
        else cardDisplay.style.fontSize = "80px";
    }

    async function listenNow() {
        if (isSpeaking) return;
        const text = list[idx];
        isSpeaking = true;
        speechSynthesis.cancel();

        if (text.length <= 4) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 1.0;
            msg.onend = () => { isSpeaking = false; };
            speechSynthesis.speak(msg);
        } else {
            // Updated Level 2 (6ms) and Level 3 (10ms)
            const delay = (text.length > 9) ? 10 : 6;
            
            const chars = Array.from(text);
            for (let char of chars) {
                if (!isSpeaking) break;
                const msg = new SpeechSynthesisUtterance(char);
                msg.lang = 'zh-CN';
                msg.rate = 1.0;
                await new Promise(resolve => {
                    msg.onend = resolve;
                    speechSynthesis.speak(msg);
                });
                await new Promise(r => setTimeout(r, delay)); 
            }
            isSpeaking = false;
        }
    }

    function ans(correct) {
        resetSpeech();
        if (correct) ok++; else no++;
        idx++;
        show();
    }

    function resetSpeech() {
        isSpeaking = false;
        speechSynthesis.cancel();
    }

    function stop() {
        resetSpeech();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
