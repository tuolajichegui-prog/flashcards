<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calligraphy Skeleton Kaiti</title>
    
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #c0392b;
            --bg: #ffffff;
        }

        body { 
            font-family: 'ZCOOL XiaoWei', serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SETUP --- */
        #setup { padding: 15px; flex: 1; display: flex; flex-direction: column; }
        textarea { 
            width: 100%; height: 40vh; font-size: 22px; font-family: inherit; 
            padding: 15px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box;
        }
        .btn-start { 
            margin-top: 15px; padding: 18px; font-size: 20px; border-radius: 10px; 
            border: none; background: var(--primary); color: white; font-weight: bold;
        }

        /* --- QUIZ (CONTROLS AT TOP) --- */
        #quiz { display: none; height: 100vh; flex-direction: column; padding: 10px; box-sizing: border-box; }

        #top-ui {
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        #header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f4f4f4;
            padding: 10px 15px;
            border-radius: 40px;
            font-family: sans-serif;
        }

        #btn-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .voice-box { display: flex; align-items: center; gap: 8px; font-family: sans-serif; font-weight: bold; }
        .voice-box input { width: 24px; height: 24px; }

        /* THE CHARACTER (The 'Model' for the patent style) */
        #card { 
            font-size: 45vw; /* Maximum size to show stroke structure */
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            color: #000;
            line-height: 1;
        }

        /* Buttons */
        .btn-check { padding: 15px; border-radius: 12px; border: none; font-size: 30px; color: white; box-shadow: 0 4px #999; }
        .btn-check:active { transform: translateY(2px); box-shadow: 0 2px #999; }
        .yes { background: var(--success); }
        .no { background: var(--danger); }
        
        .btn-exit { background: #95a5a6; padding: 8px 12px; color: white; border-radius: 20px; border: none; font-size: 13px; }

    </style>
</head>
<body>

<div id="setup">
    <h2 style="font-family: sans-serif;">Skeleton Kaiti Editor</h2>
    <textarea id="inputText" placeholder="Enter characters..."></textarea>
    <div style="margin: 15px 0; font-family: sans-serif;">
        <label><input type="checkbox" id="shuffleToggle" style="width: 18px; height: 18px;"> Shuffle</label>
    </div>
    <button class="btn-start" onclick="startQuiz()">▶ OPEN TEACHING SYSTEM</button>
</div>

<div id="quiz">
    <div id="top-ui">
        <div id="header-bar">
            <div id="score" style="font-weight:bold;">0 / 0</div>
            <label class="voice-box">
                <span>🔊 Voice</span>
                <input type="checkbox" id="soundToggle" checked>
            </label>
            <button class="btn-exit" onclick="stopQuiz()">EXIT</button>
        </div>

        <div id="btn-row">
            <button id="noBtn" class="btn-check no" onclick="answer(false)">❌</button>
            <button id="yesBtn" class="btn-check yes" onclick="answer(true)">✅</button>
        </div>
    </div>

    <div id="card"></div>
</div>

<script>
    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let incorrect = 0;

    const flipSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

    window.onload = () => {
        const saved = localStorage.getItem("cards_save");
        if (saved) document.getElementById("inputText").value = saved;
    };

    document.getElementById("inputText").addEventListener("input", (e) => {
        localStorage.setItem("cards_save", e.target.value);
    });

    function speak(text, callback) {
        if (!document.getElementById("soundToggle").checked) {
            if (callback) callback();
            return;
        }
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.8; // Slightly slower for teaching clarity
        if (callback) utterance.onend = callback;
        speechSynthesis.speak(utterance);
    }

    function startQuiz() {
        const raw = document.getElementById("inputText").value;
        cards = raw.split("\n").filter(line => line.trim() !== "");
        if (cards.length === 0) return;
        if (document.getElementById("shuffleToggle").checked) cards.sort(() => Math.random() - 0.5);

        currentIndex = 0; correct = 0; incorrect = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        showCard();
    }

    function showCard() {
        if (currentIndex >= cards.length) {
            alert(`Session Complete\n✅ ${correct} | ❌ ${incorrect}`);
            stopQuiz();
            return;
        }
        flipSound.currentTime = 0;
        flipSound.play();
        document.getElementById("card").innerText = cards[currentIndex];
        document.getElementById("score").innerText = `${currentIndex + 1}/${cards.length}`;
        document.getElementById("yesBtn").disabled = false;
        document.getElementById("noBtn").disabled = false;
    }

    function answer(isCorrect) {
        document.getElementById("yesBtn").disabled = true;
        document.getElementById("noBtn").disabled = true;
        if (isCorrect) correct++; else incorrect++;
        
        speak(cards[currentIndex], () => {
            currentIndex++;
            showCard();
        });
    }

    function stopQuiz() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
