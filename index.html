<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaiTi Flashcards</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4A90E2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f0f2f5;
        }

        body { 
            /* Priority 1: Google Calligraphy, Priority 2: System Kaiti */
            font-family: 'Ma Shan Zheng', "KaiTi", "楷体", "STKaiti", serif; 
            text-align: center; 
            background: var(--bg); 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SETUP PAGE --- */
        #setup { 
            padding: 15px; 
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        textarea { 
            width: 100%; 
            height: 45vh;
            font-size: 22px; 
            font-family: inherit; 
            padding: 15px; 
            border-radius: 12px; 
            border: 2px solid #ccc;
            box-sizing: border-box;
        }

        .setup-controls {
            margin: 20px 0;
            font-family: sans-serif;
        }

        .btn-start { 
            padding: 20px; 
            font-size: 22px; 
            border-radius: 15px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: bold;
            touch-action: manipulation;
        }

        /* --- QUIZ PAGE --- */
        #quiz { 
            display: none; 
            height: 100vh; 
            flex-direction: column; 
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
        }

        #quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-family: sans-serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .voice-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #eee;
            padding: 8px 15px;
            border-radius: 25px;
        }

        .voice-control input { width: 25px; height: 25px; }

        /* The Main Kaiti Display */
        #card { 
            font-size: 32vw; /* Very large for clarity */
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Ma Shan Zheng', "KaiTi", "楷体", "STKaiti", serif;
            color: #000;
        }

        #controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding-bottom: 5px;
        }

        .btn-correct { background: var(--success); color: white; padding: 25px; border-radius: 15px; border: none; font-size: 35px; }
        .btn-incorrect { background: var(--danger); color: white; padding: 25px; border-radius: 15px; border: none; font-size: 35px; }
        
        .btn-stop { 
            background: #6c757d; 
            grid-column: span 2; 
            padding: 12px; 
            color: white;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div id="setup">
    <h2 style="font-family: sans-serif;">Flashcard Editor</h2>
    <textarea id="inputText" placeholder="Enter words here..."></textarea>
    
    <div class="setup-controls">
        <label style="font-size: 20px;">
            <input type="checkbox" id="shuffleToggle" style="width: 20px; height: 20px;"> Shuffle Cards
        </label>
    </div>
    
    <button class="btn-start" onclick="startQuiz()">▶ START QUIZ</button>
</div>

<div id="quiz">
    <div id="quiz-header">
        <div id="score" style="font-weight:bold">0 / 0</div>
        <label class="voice-control">
            <span style="font-weight: bold;">🔊 Voice</span>
            <input type="checkbox" id="soundToggle" checked>
        </label>
    </div>

    <div id="card"></div>
    
    <div id="controls">
        <button id="incorrectBtn" class="btn-incorrect" onclick="answer(false)">❌</button>
        <button id="correctBtn" class="btn-correct" onclick="answer(true)">✅</button>
        <button class="btn-stop" onclick="stopQuiz()">⏹ EXIT</button>
    </div>
</div>

<script>
    let cards = [];
    let currentIndex = 0;
    let correct = 0;
    let incorrect = 0;

    const flipSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

    window.onload = () => {
        const saved = localStorage.getItem("cards_save");
        if (saved) document.getElementById("inputText").value = saved;
    };

    document.getElementById("inputText").addEventListener("input", (e) => {
        localStorage.setItem("cards_save", e.target.value);
    });

    function speak(text, callback) {
        if (!document.getElementById("soundToggle").checked) {
            if (callback) callback();
            return;
        }
        speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        if (callback) utterance.onend = callback;
        speechSynthesis.speak(utterance);
    }

    function startQuiz() {
        const raw = document.getElementById("inputText").value;
        cards = raw.split("\n").filter(line => line.trim() !== "");
        if (cards.length === 0) return;
        if (document.getElementById("shuffleToggle").checked) cards.sort(() => Math.random() - 0.5);

        currentIndex = 0; correct = 0; incorrect = 0;
        document.getElementById("setup").style.display = "none";
        document.getElementById("quiz").style.display = "flex";
        showCard();
    }

    function showCard() {
        if (currentIndex >= cards.length) {
            alert(`✅ ${correct} | ❌ ${incorrect}`);
            stopQuiz();
            return;
        }
        flipSound.currentTime = 0;
        flipSound.play();
        document.getElementById("card").innerText = cards[currentIndex];
        document.getElementById("score").innerText = `${currentIndex + 1}/${cards.length}`;
        document.getElementById("correctBtn").disabled = false;
        document.getElementById("incorrectBtn").disabled = false;
    }

    function answer(isCorrect) {
        document.getElementById("correctBtn").disabled = true;
        document.getElementById("incorrectBtn").disabled = true;
        if (isCorrect) correct++; else incorrect++;
        speak(cards[currentIndex], () => {
            currentIndex++;
            showCard();
        });
    }

    function stopQuiz() {
        speechSynthesis.cancel();
        document.getElementById("setup").style.display = "flex";
        document.getElementById("quiz").style.display = "none";
    }
</script>
</body>
</html>
